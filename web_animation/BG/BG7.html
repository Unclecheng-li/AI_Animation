<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深蓝渐变噪点背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            /* 设置左下角和右上角为蓝色，其他部分为黑色，增大左下角蓝色块的大小 */
            background: 
                radial-gradient(circle at bottom left, #001f54 0%, transparent 50%),
                radial-gradient(circle at top right, #001f54 0%, transparent 30%),
                #000000;
            animation: gradientShift 15s ease infinite;
        }
        /* 背景渐变动画 */
        @keyframes gradientShift {
            0% {
                background-size: 100% 100%;
            }
            50% {
                background-size: 110% 110%;
            }
            100% {
                background-size: 100% 100%;
            }
        }
        /* 噪点纹理层 - 略微提高透明度适配深色背景 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15; /* 略提高噪点透明度，在深色背景更明显 */
            mix-blend-mode: overlay;
            animation: noiseMove 20s linear infinite;
        }
        /* 噪点纹理动画 */
        @keyframes noiseMove {
            0% {
                transform: translate(0, 0) scale(1.1);
            }
            25% {
                transform: translate(-2%, -2%) scale(1.05);
            }
            50% {
                transform: translate(0, 0) scale(1.1);
            }
            75% {
                transform: translate(2%, 2%) scale(1.05);
            }
            100% {
                transform: translate(0, 0) scale(1.1);
            }
        }
        /* Canvas粒子效果样式 */
        #particlesCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        /* 右上角logo - 适配深色背景调整颜色 */
        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-family: sans-serif;
            text-align: right;
            z-index: 2;
        }
        .logo svg {
            width: 32px;
            height: 32px;
            margin-bottom: 4px;
        }
        .logo-text {
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 调整logo颜色适配蓝色背景 -->
            <circle cx="50" cy="30" r="12" fill="#60a5fa"/>
            <path d="M35 45 Q50 70 65 45" stroke="#60a5fa" stroke-width="4" fill="none"/>
            <path d="M30 60 Q50 90 70 60" stroke="#60a5fa" stroke-width="4" fill="none"/>
        </svg>
        <div class="logo-text">NetworkNoob</div>
    </div>
    <!-- Canvas粒子效果 -->
    <canvas id="particlesCanvas"></canvas>
    <script>
        // 粒子效果实现
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 创建粒子数组
        const particles = [];
        const particleCount = 100;
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = `rgba(96, 165, 250, ${this.opacity})`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // 边界检测
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 初始化粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
    </script>
</body>
</html>
