<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渐变色光斑特效背景</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面容器：全屏展示，相对定位（用于SVG背景定位） */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #0a0a1a; /* 基础背景色 */
        }

        /* SVG背景层：绝对定位铺满全屏，作为唯一视觉元素 */
        #light-spot-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* 避免遮挡页面交互（如有其他元素） */
        }
        
        /* 动态水印样式 */
        .watermark {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.15);
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: watermarkAnimation 8s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        
        /* 水印动画 */
        @keyframes watermarkAnimation {
            0%, 100% {
                transform: translateX(0) translateY(0) rotate(0deg);
                opacity: 0.15;
            }
            25% {
                transform: translateX(-10px) translateY(5px) rotate(1deg);
                opacity: 0.25;
            }
            50% {
                transform: translateX(0) translateY(10px) rotate(0deg);
                opacity: 0.15;
            }
            75% {
                transform: translateX(10px) translateY(5px) rotate(-1deg);
                opacity: 0.25;
            }
        }
    </style>
</head>
<body>
    <!-- SVG光斑背景容器 -->
    <svg id="light-spot-bg" xmlns="http://www.w3.org/2000/svg">
        <!-- 定义渐变：多个径向渐变（光斑核心） -->
        <defs>
            <!-- 渐变1：蓝紫色系 -->
            <radialGradient id="gradient1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
            </radialGradient>
            <!-- 渐变2：青绿色系 -->
            <radialGradient id="gradient2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
            </radialGradient>
            <!-- 渐变3：粉橙色系 -->
            <radialGradient id="gradient3" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
            </radialGradient>
            <!-- 渐变4：紫色系 -->
            <radialGradient id="gradient4" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
                <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
            </radialGradient>
        </defs>
        <!-- 光斑会由JS动态生成 -->
        <g id="spot-container"></g>
    </svg>
    
    <!-- 动态水印 -->
    <div class="watermark">
        Artificial Intelligence Noob
    </div>

    <script>
        // 核心配置项（可自定义调整）
        const config = {
            spotCount: 8, // 光斑数量（减少）
            minSize: 300,  // 光斑最小尺寸(px)（进一步增大）
            maxSize: 800,  // 光斑最大尺寸(px)（进一步增大）
            minSpeed: 0.1, // 最小移动速度
            maxSpeed: 0.5, // 最大移动速度
            gradients: ['gradient1', 'gradient4'] // 可用渐变ID（只保留蓝色和紫色）
        };

        // 获取SVG容器和光斑父元素
        const svg = document.getElementById('light-spot-bg');
        const spotContainer = document.getElementById('spot-container');
        let svgWidth = svg.clientWidth;
        let svgHeight = svg.clientHeight;

        // 生成单个光斑
        function createSpot() {
            // 创建圆形元素
            const spot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            
            // 随机属性
            const size = Math.random() * (config.maxSize - config.minSize) + config.minSize;
            const gradient = config.gradients[Math.floor(Math.random() * config.gradients.length)];
            const initialX = Math.random() * (svgWidth - size) + size / 2;
            const initialY = Math.random() * (svgHeight - size) + size / 2;
            const speedX = (Math.random() - 0.5) * 2 * config.maxSpeed; // 左右移动
            const speedY = (Math.random() - 0.5) * 2 * config.maxSpeed; // 上下移动
            const scaleSpeed = Math.random() * 0.001 + 0.0005; // 缩放速度
            const opacitySpeed = Math.random() * 0.002 + 0.001; // 透明度变化速度

            // 设置初始属性
            spot.setAttribute('cx', initialX);
            spot.setAttribute('cy', initialY);
            spot.setAttribute('r', size / 2); // 圆的半径是尺寸的一半
            spot.setAttribute('fill', `url(#${gradient})`);
            spot.setAttribute('opacity', Math.random() * 0.5 + 0.3); // 初始透明度

            // 存储动态属性（用于动画）
            spot.dataset.speedX = speedX;
            spot.dataset.speedY = speedY;
            spot.dataset.scaleSpeed = scaleSpeed;
            spot.dataset.opacitySpeed = opacitySpeed;
            spot.dataset.baseSize = size / 2; // 基础半径
            spot.dataset.scaleDirection = Math.random() > 0.5 ? 1 : -1; // 缩放方向
            spot.dataset.opacityDirection = Math.random() > 0.5 ? 1 : -1; // 透明度方向

            return spot;
        }

        // 初始化所有光斑
        function initSpots() {
            // 清空现有光斑（避免重复）
            spotContainer.innerHTML = '';
            for (let i = 0; i < config.spotCount; i++) {
                const spot = createSpot();
                spotContainer.appendChild(spot);
            }
        }

        // 光斑动画逻辑
        function animateSpots() {
            const spots = spotContainer.querySelectorAll('circle');
            
            spots.forEach(spot => {
                // 1. 移动逻辑
                let x = parseFloat(spot.getAttribute('cx')) + parseFloat(spot.dataset.speedX);
                let y = parseFloat(spot.getAttribute('cy')) + parseFloat(spot.dataset.speedY);

                // 超出边界则重置位置
                if (x < -config.maxSize / 2) x = svgWidth + config.maxSize / 2;
                if (x > svgWidth + config.maxSize / 2) x = -config.maxSize / 2;
                if (y < -config.maxSize / 2) y = svgHeight + config.maxSize / 2;
                if (y > svgHeight + config.maxSize / 2) y = -config.maxSize / 2;

                spot.setAttribute('cx', x);
                spot.setAttribute('cy', y);

                // 2. 缩放逻辑
                let currentScale = parseFloat(spot.getAttribute('r')) / parseFloat(spot.dataset.baseSize);
                currentScale += parseFloat(spot.dataset.scaleSpeed) * parseFloat(spot.dataset.scaleDirection);
                
                // 缩放边界（0.8-1.2倍基础尺寸）
                if (currentScale > 1.2) spot.dataset.scaleDirection = -1;
                if (currentScale < 0.8) spot.dataset.scaleDirection = 1;
                
                spot.setAttribute('r', parseFloat(spot.dataset.baseSize) * currentScale);

                // 3. 透明度变化逻辑
                let opacity = parseFloat(spot.getAttribute('opacity')) + parseFloat(spot.dataset.opacitySpeed) * parseFloat(spot.dataset.opacityDirection);
                
                // 透明度边界（0.2-0.8）
                if (opacity > 0.8) spot.dataset.opacityDirection = -1;
                if (opacity < 0.2) spot.dataset.opacityDirection = 1;
                
                spot.setAttribute('opacity', opacity);
            });

            // 循环动画
            requestAnimationFrame(animateSpots);
        }

        // 初始化并启动动画
        initSpots();
        animateSpots();

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            // 重新获取尺寸
            svgWidth = svg.clientWidth;
            svgHeight = svg.clientHeight;
            // 重新生成光斑
            initSpots();
        });
    </script>
</body>
</html>
