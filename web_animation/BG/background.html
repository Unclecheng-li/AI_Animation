<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仅保留背景效果</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 配置Tailwind自定义颜色 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0f172a',
            darker: '#020617',
            neon: '#39ff14',
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .grid-bg {
        background-size: 40px 40px;
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      }
    }
  </style>
</head>
<body class="bg-darker font-tech grid-bg min-h-screen overflow-x-hidden">
  <script>
    // 网格背景动画效果
    const container = document.querySelector('.grid-bg');
    let gridOffset = 0;
    
    function animateGrid() {
      gridOffset = (gridOffset + 0.2) % 40;
      container.style.backgroundPosition = `${gridOffset}px ${gridOffset}px`;
      requestAnimationFrame(animateGrid);
    }
    
    animateGrid();
  </script>
</body>
</html>
