<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玻璃拟态（Glassmorphism）背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 底层容器：提供渐变背景，作为玻璃拟态的对比层 */
        .bg-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            /* 多彩渐变背景，凸显玻璃效果 */
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #f97316);
            background-size: 400% 400%;
            /* 渐变缓慢动画，增强视觉层次 */
            animation: gradientMove 60s ease infinite;
        }

        /* 装饰性模糊形状：让背景更丰富，突出玻璃质感 */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(80px);
            z-index: 1;
        }
        .shape1 {
            width: 600px;
            height: 600px;
            top: -300px;
            left: -300px;
        }
        .shape2 {
            width: 500px;
            height: 500px;
            bottom: -250px;
            right: -250px;
        }

        /* 核心：玻璃拟态全屏背景层 */
        .glass-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 玻璃拟态核心属性 */
            background: rgba(255, 255, 255, 0.08); /* 半透明白色底 */
            backdrop-filter: blur(12px); /* 毛玻璃模糊，关键！ */
            -webkit-backdrop-filter: blur(12px); /* 兼容webkit内核浏览器（Chrome/Safari） */
            border: 1px solid rgba(255, 255, 255, 0.15); /* 半透明细边框 */
            z-index: 2;
            pointer-events: none; /* 不遮挡下层交互（如有） */
        }



        /* 渐变背景动画 */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

    </style>
</head>
<body>
    <!-- 底层渐变背景容器 -->
    <div class="bg-container">
        <!-- 装饰性模糊形状 -->
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        
        <!-- 玻璃拟态全屏背景层 -->
        <div class="glass-bg"></div>


    </div>
</body>
</html>
