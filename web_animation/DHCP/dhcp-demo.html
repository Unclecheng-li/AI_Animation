<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHCP协议工作演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        darker: '#0A0A0A',
                        primary: '#BB86FC',
                        secondary: '#FF0080',
                        accent: '#03DAC6',
                        surface: '#1E1E1E',
                    },
                    fontFamily: {
                        mono: ['Fira Code', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glow {
                filter: drop-shadow(0 0 8px rgba(255, 0, 128, 0.6));
            }
            .glow-blue {
                filter: drop-shadow(0 0 8px rgba(3, 218, 198, 0.6));
            }
            .glow-purple {
                filter: drop-shadow(0 0 8px rgba(187, 134, 252, 0.6));
            }
            .bg-grid {
                background-image: 
                    linear-gradient(rgba(3, 218, 198, 0.1) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(3, 218, 198, 0.1) 1px, transparent 1px);
                background-size: 20px 20px;
            }
            .animate-float {
                animation: float 6s ease-in-out infinite;
            }
            .animate-pulse-slow {
                animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-15px); }
                100% { transform: translateY(0px); }
            }
        }
    </style>
</head>
<body class="bg-dark text-gray-200 min-h-screen font-sans overflow-x-hidden">
    <!-- 粒子背景 -->
    <div id="particles" class="fixed inset-0 z-0 opacity-30"></div>
    
    <!-- 主容器 -->
    <div class="relative z-10 container mx-auto px-4 py-8">
        <!-- 标题区域 -->
        <header class="text-center mb-12">
            <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary mb-4">DHCP 协议演示</h1>
            <p class="text-gray-400 max-w-2xl mx-auto">展示客户端与服务器之间的报文交互过程：发现(Discover) → 提供(Offer) → 请求(Request) → 确认(ACK)</p>
        </header>

        <!-- 控制区域 -->
        <div class="flex justify-center mb-8 gap-4">
            <button id="startBtn" class="bg-secondary hover:bg-secondary/80 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 glow flex items-center gap-2">
                <i class="fa fa-play"></i> 开始演示
            </button>
            <button id="resetBtn" class="bg-surface hover:bg-surface/80 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 flex items-center gap-2">
                <i class="fa fa-refresh"></i> 重置
            </button>
        </div>

        <!-- 演示区域 -->
        <div class="relative bg-surface/50 rounded-2xl p-6 md:p-10 mb-8 overflow-hidden">
            <!-- 网格背景 -->
            <div class="absolute inset-0 bg-grid opacity-20"></div>
            
            <!-- 客户端和服务器 -->
            <div class="relative flex flex-col md:flex-row justify-between items-center min-h-[400px] md:min-h-[500px]">
                <!-- 客户端 -->
                <div id="client" class="client w-32 h-32 md:w-40 md:h-40 bg-surface rounded-xl flex flex-col items-center justify-center mb-10 md:mb-0 border-2 border-primary glow-purple z-10">
                    <i class="fa fa-laptop text-5xl md:text-6xl text-primary mb-2"></i>
                    <span class="font-bold">客户端</span>
                    <span id="clientIp" class="text-xs text-gray-400 mt-1">IP: 未知</span>
                </div>
                
                <!-- 中间消息区域 -->
                <div id="messageArea" class="absolute w-full h-full flex items-center justify-center pointer-events-none">
                    <!-- 消息气泡会动态添加到这里 -->
                </div>
                
                <!-- 服务器 -->
                <div id="server" class="server w-32 h-32 md:w-40 md:h-40 bg-surface rounded-xl flex flex-col items-center justify-center border-2 border-accent glow-blue z-10">
                    <i class="fa fa-server text-5xl md:text-6xl text-accent mb-2"></i>
                    <span class="font-bold">服务器</span>
                    <span class="text-xs text-gray-400 mt-1">IP: 192.168.1.1</span>
                </div>
            </div>
        </div>

        <!-- 状态区域 -->
        <div class="bg-surface/50 rounded-xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa fa-info-circle text-secondary"></i> 状态信息
            </h2>
            <div id="statusLog" class="font-mono text-sm space-y-2 max-h-40 overflow-y-auto pr-2">
                <div class="text-gray-400">等待演示开始...</div>
            </div>
        </div>

        <!-- 阶段指示器 -->
        <div class="flex justify-between items-center relative">
            <div class="absolute top-1/2 left-0 right-0 h-1 bg-gray-700 -translate-y-1/2 z-0"></div>
            <div class="absolute top-1/2 left-0 h-1 bg-secondary transition-all duration-1000 ease-in-out -translate-y-1/2 z-10" id="progressBar" style="width: 0%"></div>
            
            <div class="stage-indicator z-20 flex flex-col items-center" data-stage="1">
                <div class="w-8 h-8 rounded-full bg-dark border-2 border-primary flex items-center justify-center mb-2 transition-all duration-500">
                    <span>1</span>
                </div>
                <span class="text-xs md:text-sm text-center">发现</span>
            </div>
            
            <div class="stage-indicator z-20 flex flex-col items-center" data-stage="2">
                <div class="w-8 h-8 rounded-full bg-dark border-2 border-gray-600 flex items-center justify-center mb-2 transition-all duration-500">
                    <span>2</span>
                </div>
                <span class="text-xs md:text-sm text-center">提供</span>
            </div>
            
            <div class="stage-indicator z-20 flex flex-col items-center" data-stage="3">
                <div class="w-8 h-8 rounded-full bg-dark border-2 border-gray-600 flex items-center justify-center mb-2 transition-all duration-500">
                    <span>3</span>
                </div>
                <span class="text-xs md:text-sm text-center">请求</span>
            </div>
            
            <div class="stage-indicator z-20 flex flex-col items-center" data-stage="4">
                <div class="w-8 h-8 rounded-full bg-dark border-2 border-gray-600 flex items-center justify-center mb-2 transition-all duration-500">
                    <span>4</span>
                </div>
                <span class="text-xs md:text-sm text-center">确认</span>
            </div>
        </div>
    </div>

    <script>
        // 粒子背景效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 3 + 1;
                
                particle.style.position = 'absolute';
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = Math.random() > 0.7 ? '#FF0080' : '#03DAC6';
                particle.style.borderRadius = '50%';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                particle.style.animation = `float ${Math.random() * 10 + 10}s linear infinite`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // DHCP演示逻辑
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusLog = document.getElementById('statusLog');
            const progressBar = document.getElementById('progressBar');
            const clientIp = document.getElementById('clientIp');
            const messageArea = document.getElementById('messageArea');
            
            let isRunning = false;
            let currentStage = 0;
            const totalStages = 4;
            
            // DHCP消息类型
            const messages = [
                {
                    from: 'client',
                    to: 'server',
                    text: 'DHCP Discover\n寻找可用的DHCP服务器',
                    color: 'primary'
                },
                {
                    from: 'server',
                    to: 'client',
                    text: 'DHCP Offer\n提供IP: 192.168.1.100',
                    color: 'accent'
                },
                {
                    from: 'client',
                    to: 'server',
                    text: 'DHCP Request\n请求使用192.168.1.100',
                    color: 'primary'
                },
                {
                    from: 'server',
                    to: 'client',
                    text: 'DHCP ACK\n确认分配IP: 192.168.1.100',
                    color: 'secondary'
                }
            ];
            
            // 日志添加函数
            function addLog(message, isSystem = false) {
                const logEntry = document.createElement('div');
                logEntry.className = isSystem ? 'text-gray-400' : '';
                logEntry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
                statusLog.appendChild(logEntry);
                statusLog.scrollTop = statusLog.scrollHeight;
            }
            
            // 更新阶段指示器
            function updateStageIndicator(stage) {
                document.querySelectorAll('.stage-indicator').forEach(indicator => {
                    const indStage = parseInt(indicator.dataset.stage);
                    const circle = indicator.querySelector('div');
                    
                    if (indStage < stage) {
                        circle.classList.remove('border-gray-600', 'border-primary', 'border-accent');
                        circle.classList.add('border-secondary', 'bg-secondary/20');
                    } else if (indStage === stage) {
                        circle.classList.remove('border-gray-600', 'border-secondary', 'bg-secondary/20');
                        circle.classList.add(indStage === 1 || indStage === 3 ? 'border-primary' : 'border-accent');
                    } else {
                        circle.classList.remove('border-primary', 'border-accent', 'border-secondary', 'bg-secondary/20');
                        circle.classList.add('border-gray-600');
                    }
                });
                
                progressBar.style.width = `${((stage - 1) / (totalStages - 1)) * 100}%`;
            }
            
            // 创建消息气泡并添加动画
            function createMessageBubble(message) {
                const bubble = document.createElement('div');
                const isFromClient = message.from === 'client';
                
                bubble.className = `absolute px-4 py-2 rounded-lg max-w-xs text-sm transition-all duration-1000 ease-in-out transform opacity-0`;
                bubble.style.backgroundColor = `var(--tw-color-${message.color})`;
                bubble.style.color = 'white';
                bubble.style.zIndex = '5';
                bubble.innerHTML = message.text.replace('\n', '<br>');
                
                // 初始位置
                const clientEl = document.getElementById('client');
                const serverEl = document.getElementById('server');
                const clientRect = clientEl.getBoundingClientRect();
                const serverRect = serverEl.getBoundingClientRect();
                const containerRect = messageArea.getBoundingClientRect();
                
                const startX = isFromClient 
                    ? clientRect.left + clientRect.width - containerRect.left
                    : serverRect.left - containerRect.left;
                const startY = isFromClient
                    ? clientRect.top + clientRect.height/2 - containerRect.top
                    : serverRect.top + serverRect.height/2 - containerRect.top;
                
                // 结束位置
                const endX = isFromClient
                    ? serverRect.left - containerRect.left
                    : clientRect.left + clientRect.width - containerRect.left;
                const endY = isFromClient
                    ? serverRect.top + serverRect.height/2 - containerRect.top
                    : clientRect.top + clientRect.height/2 - containerRect.top;
                
                // 设置初始位置
                bubble.style.left = `${startX}px`;
                bubble.style.top = `${startY}px`;
                
                messageArea.appendChild(bubble);
                
                // 触发动画
                setTimeout(() => {
                    bubble.style.opacity = '1';
                    bubble.style.transform = `translate(${endX - startX}px, ${endY - startY}px)`;
                }, 100);
                
                // 动画结束后移除
                setTimeout(() => {
                    bubble.style.opacity = '0';
                    setTimeout(() => {
                        bubble.remove();
                    }, 1000);
                }, 3000);
                
                return new Promise(resolve => {
                    setTimeout(resolve, 4000);
                });
            }
            
            // 执行单个阶段
            async function runStage(stage) {
                if (stage > totalStages) {
                    addLog('DHCP协议交互完成！客户端已获取IP地址。', true);
                    isRunning = false;
                    startBtn.innerHTML = '<i class="fa fa-play"></i> 重新开始';
                    return;
                }
                
                currentStage = stage;
                updateStageIndicator(stage);
                
                const message = messages[stage - 1];
                const from = message.from === 'client' ? '客户端' : '服务器';
                const to = message.to === 'client' ? '客户端' : '服务器';
                
                addLog(`${from} 向 ${to} 发送: ${message.text.split('\n')[0]}`);
                
                // 添加发送方动画效果
                const senderEl = document.getElementById(message.from);
                senderEl.classList.add('scale-110', 'animate-pulse-slow');
                
                await createMessageBubble(message);
                
                // 移除动画效果
                senderEl.classList.remove('scale-110', 'animate-pulse-slow');
                
                // 最后一个阶段更新客户端IP
                if (stage === 4) {
                    clientIp.textContent = 'IP: 192.168.1.100';
                    clientIp.classList.add('text-secondary');
                }
                
                // 延迟进入下一阶段
                setTimeout(() => runStage(stage + 1), 1000);
            }
            
            // 开始演示
            startBtn.addEventListener('click', () => {
                if (isRunning) return;
                
                isRunning = true;
                startBtn.disabled = true;
                startBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 演示中...';
                addLog('开始DHCP协议演示...', true);
                runStage(1);
            });
            
            // 重置演示
            resetBtn.addEventListener('click', () => {
                isRunning = false;
                currentStage = 0;
                messageArea.innerHTML = '';
                statusLog.innerHTML = '<div class="text-gray-400">等待演示开始...</div>';
                updateStageIndicator(0);
                progressBar.style.width = '0%';
                clientIp.textContent = 'IP: 未知';
                clientIp.classList.remove('text-secondary');
                
                document.getElementById('client').classList.remove('scale-110', 'animate-pulse-slow');
                document.getElementById('server').classList.remove('scale-110', 'animate-pulse-slow');
                
                startBtn.disabled = false;
                startBtn.innerHTML = '<i class="fa fa-play"></i> 开始演示';
                
                addLog('演示已重置', true);
            });
        });
    </script>
</body>
</html>
